<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiJe Chatbot Analisis Sentimen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🚌 TiJe Sentiment Chatbot</h2>
            <p>Masukkan keluhan/ulasan Anda mengenai TransJakarta</p>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                Halo! Saya adalah chatbot analisis sentimen. Ada yang bisa saya bantu terkait ulasan TiJe hari ini?
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ketik ulasan di sini... (cth: Bus telat parah ac panas)">
            <button id="sendBtn">Kirim</button>
        </div>
    </div>

    <script href="script.js"></script>
    <script src="script.js"></script>
</body>
</html>
